<!DOCTYPE html>

<html lang="en">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Betania+Patmos+In&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    body {

        height: 100vh;

        margin: 0;

        position: relative;

        font-family: "Quicksand", sans-serif;

        background-image: url("assets/game.gif");

        background-size: cover;

        background-position: center;

    }

    .dropdown {

        position: absolute;

        top: 20px;

        right: 20px;

        z-index: 100;

    }

    .icon-btn {

        background: none;

        border: none;

        cursor: pointer;

    }

    .icon-btn i {

        font-size: 28px;

        color: antiquewhite;

    }

    .icon-btn i:hover {

        font-size: 32px;

    }

    .dropdown-content {

        display: none;

        position: absolute;

        right: 0;

        background-color: antiquewhite;

        min-width: 180px;

        border: 2px solid black;

        box-shadow: 4px 4px 0 black;

    }

    .dropdown-content button {

        width: 100%;

        padding: 10px;

        border: none;

        background: none;

        cursor: pointer;

        font-family: "Betania Patmos In", cursive;

    }

    .dropdown-content button:hover {

        background-color: #000;

        color: white;

    }

    .dropdown-content.show {

        display: block;

    }

    .game-area {

        display: flex;

        flex-direction: column;

        align-items: center;

        justify-content: center;

        width: 100%;

        text-align: center;

        margin-bottom: 40px;

    }

    #cat-frame {

        position: absolute;

        left: 0;

        bottom: 0;

        width: 300px;

        height: 260px;

        display: flex;

        align-items: flex-end;

        justify-content: center;

        transition: left 0.8s linear;

        transform: 0.3s ease;

    }

    #cat {

        max-width: 100%;

        max-height: 100%;

        object-fit: contain;

        object-position: center bottom;

    }

    .status {

        position: absolute;

        top: 30px;

        left: 30px;

        display: flex;

        flex-direction: column;

        font-size: 28px;

        gap: 10px;

    }

    .status i {

        width: 30px;

        text-align: center;

        font-size: 28px;

        margin-right: 5px;

    }

    .bars {

        display: flex;

        gap: 8px;

        align-items: center;

        min-height: 32px;

    }

    .bars:hover {

        transform: scale(1.1);

        opacity: 0.9;

    }

    .actions {

        position: absolute;

        right: 40px;

        top: 50%;

        transform: translateY(-50%);

        display: flex;

        flex-direction: column;

        gap: 30px;

        width: 130px;

    }

    .actions button {

        padding: 10px 25px;

        font-size: 18px;

        border: solid black;

        cursor: pointer;

        font-family: "Delius Swash Caps", cursive;

        transition: 0.3s;

        border: 2px solid black;

        box-shadow: 4px 4px 0 black;

    }

    .actions button:hover {

        transform: scale(1.1);

        opacity: 0.9;

    }

    #feedBtn {

        background-color: antiquewhite;

        color: black;

    }

    #petBtn {

        background-color: antiquewhite;

        color: black;

    }

    #playBtn {

        background-color: antiquewhite;

        color: black;

    }

    #hungerBar {

        color: orange;

    }

    #happyBar {

        color: hotpink;

    }

    #playBar {

        color: gold;

    }

    .modal-overlay {

        position: fixed;

        inset: 0;

        background: rgba(0, 0, 0, 0.6);

        display: flex;

        justify-content: center;

        align-items: center;

        z-index: 9999;

        opacity: 0;

        pointer-events: none;

        transition: 0.25s ease;

    }

    .modal-overlay.show {

        opacity: 1;

        pointer-events: auto;

    }

    .modal-box {

        justify-content: center;

        background: antiquewhite;

        border: 2px solid black;

        box-shadow: 4px 4px 0 black;

        padding: 24px 28px;

        width: min(90%, 420px);

        font-family: "Delius Swash Caps", cursive;

        transform: scale(0.9);

        transition: 0.25s ease;

        font-size: 14px;

    }

    .modal-overlay.show .modal-box {

        transform: scale(1);

    }

    .modal-actions {

        display: flex;

        justify-content: flex-end;

        margin-top: 18px;

        gap: 10px;

    }

    .modal-actions button {

        padding: 6px 16px;

        font-family: inherit;

        cursor: pointer;

        border-radius: 10%;

        font-family: "Quicksand", solid sans-serif;

        background-color: antiquewhite;

    }

    .modal-actions button:hover {

        background: black;

        color: white;

    }

    .modal-actions.modalOk {

        font-family: "Source Code Pro", monospace;

        font-size: 20px;

    }

    .hidden {

        display: none;

    }
</style>

<head>

    <meta charset="UTF-8">

    <title>Home Sweet Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="dropdown">

        <button class="icon-btn" id="settingBtn"><i class="fa-solid fa-gear"></i></button>

        <div class="dropdown-content">

            <button id="musicToggle"><i class="fa-solid fa-music"></i> Music: ON</button>

            <button id="sfxToggle"><i class="fa-solid fa-volume-high"></i></i> SFX: ON</button>

            <button id="saveBtn"><i class="fa-solid fa-download"></i> Save Game</button>

            <button id="exitBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Exit Game</button>

            <button id="aboutBtn"><i class="fa-solid fa-circle-exclamation"></i> About</button>

        </div>

    </div>

    <div class="game-area">

        <div id="cat-frame">

            <img id="cat" src="assets/cat1.png" alt="Noir">

        </div>

        <div class="status">

            <div class="bars" id="hungerBar" title="Hunger"><i class="fa-solid fa-fish"></i></div>

            <div class="bars" id="happyBar" title="Happiness"><i class="fa-solid fa-heart"></i></div>

            <div class="bars" id="playBar" title="Energy"><i class="fa-solid fa-bolt"></i></div>

        </div>

        <div class="actions">

            <button class="action" id="feedBtn">Feed</button>

            <button class="action" id="petBtn">Pet</button>

            <button class="action" id="playBtn">Play</button>

        </div>

    </div>

    <div id="modalOverlay" class="modal-overlay hidden">

        <div class="modal-box">

            <h2 id="modalTitle">About Noir</h2>

            <p id="modalText"></p>

            <div class="modal-actions">

                <button id="modalCancel" class="hidden"><i class="fa-solid fa-xmark"></i></button>

                <button id="modalConfirm" class="hidden"><i class="fa-solid fa-check"></i></button>

                <button id="modalOk"> OK </button>

            </div>

        </div>

    </div>

    <script src="./play.js"></script>

</body>

</html>
