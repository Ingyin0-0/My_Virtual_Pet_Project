<!DOCTYPE html>

<html lang="en">

<style>
    @import url('https://fonts.googleapis.com/css2?family=Betania+Patmos+In&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    body {

        margin: 0;

        height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;

        font-family: Arial, sans-serif;

        background-image: url("assets/black cats.gif");

        background-size: cover;

        background-position: center;
    }

    h1 {

        font-family: "Betania Patmos In", cursive;

        margin-bottom: 0;

        padding-bottom: 5px;

        font-size: 45px;

        color: antiquewhite;

    }

    p {

        font-family: "Betania Patmos In", cursive;

        margin-top: 0;
        
        font-size: 20px;

        color: antiquewhite;

    }

    .container {

        margin-bottom: 5%;

        text-align: center;

        color: white;

        display: flex;

        flex-direction: column;

        gap: 20px;

        align-items: center;

    }

    .retro-btn {

        width: 250px;

        background-color: e0e0e0;

        border: 3px solid #000;

        padding: 15px 30px;

        font-size: 12px;

        text-transform: uppercase;

        cursor: pointer;

        box-shadow: 4px 4px 0 #000;

        background-color: antiquewhite;

        color: black;

        font-family: "Betania Patmos In", cursive;

        font-size: 18px;

    }

    .retro-btn:active:hover {

        box-shadow: 0 0 0 #000;

        transform: translate(4px, 4px);

    }

    .retro-btn:hover {

        background-color: #000;

        color: white;

        box-shadow: 4px 4px 0 white;

    }

    .dropdown {

        position: absolute;

        top: 20px;

        right: 20px;

        z-index: 100;

    }

    .icon-btn {

        background: none;

        border: none;

        cursor: pointer;

    }

    .icon-btn i {

        font-size: 28px;

        color: antiquewhite;

    }

    .icon-btn i:hover {

        font-size: 32px;

    }

    .dropdown-content {

        display: none;

        position: absolute;

        right: 0;

        background-color: antiquewhite;

        min-width: 180px;

        border: 2px solid black;

        box-shadow: 4px 4px 0 black;

    }

    .dropdown-content button {

        width: 100%;

        padding: 10px;

        border: none;

        background: none;

        cursor: pointer;

        font-family: "Betania Patmos In", cursive;

    }

    .dropdown-content button:hover {

        background-color: #000;

        color: white;

    }

    .dropdown-content.show {

        display: block;

    }

    .modal-overlay {

        position: fixed;

        inset: 0;

        background: rgba(0, 0, 0, 0.6);

        display: flex;

        justify-content: center;

        align-items: center;

        z-index: 9999;

        opacity: 0;

        pointer-events: none;

        transition: 0.25s ease;

    }

    .modal-overlay.show {

        opacity: 1;

        pointer-events: auto;

    }

    .modal-box {

        justify-content: center;

        background: antiquewhite;

        border: 2px solid black;

        box-shadow: 4px 4px 0 black;

        padding: 24px 28px;

        width: min(90%, 420px);

        font-family: "Delius Swash Caps", cursive;

        transform: scale(0.9);

        transition: 0.25s ease;

        font-size: 14px;

    }

    .modal-overlay.show .modal-box {

        transform: scale(1);

    }

    .modal-actions {

        display: flex;

        justify-content: flex-end;

        margin-top: 18px;

        gap: 10px;

    }

    .modal-actions button {

        padding: 6px 16px;

        font-family: inherit;

        cursor: pointer;

        border-radius: 10%;

        font-family: "Quicksand", solid sans-serif;

        background-color: antiquewhite;

    }

    .modal-actions button:hover {

        background: black;

        color: white;

    }

    .modal-actions.modalOk {

        font-family: "Source Code Pro", monospace;

        font-size: 20px;

    }

    .hidden {

        display: none;

    }
</style>

<head>

    <meta charset="UTF-8">

    <title>Noir - Virtual Cat</title>

    <link rel="stylesheet" href="./style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <h1>NOIR</h1>

        <p>A small black cat is waiting for you...</p>

        <button class="retro-btn" id="startBtn">Start</button>

        <button class="retro-btn" id="continueBtn" disabled>Continue</button>

        <div class="dropdown">

            <button class="icon-btn" id="settingBtn"><i class="fa-solid fa-gear"></i></button>

            <div class="dropdown-content">

                <button id="musicToggle"><i class="fa-solid fa-music"></i> Music: ON</button>

                <button id="sfxToggle"><i class="fa-solid fa-volume-high"></i> SFX: ON</button>

                <button id="aboutBtn"><i class="fa-solid fa-circle-exclamation"></i> About</button>

            </div>

        </div>

    </div>

    <div id="modalOverlay" class="modal-overlay hidden">

        <div class="modal-box">

            <h2 id="modalTitle">About Noir</h2>

            <p id="modalText"></p>

            <div class="modal-actions">

                <button id="modalCancel" class="" hidden"><i class="fa-solid fa-xmark"></i></button>

                <button id="modalConfirm" class="" hidden"><i class="fa-solid fa-check"></i></button>

                <button id="modalOk"> OK </button>

            </div>

        </div>

    </div>

    <script src="home.js" defer></script>

</body>

</html>
